<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Create Account — Inkwell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(184, 134, 11, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(212, 175, 55, 0.1), transparent), var(--bg);
            position: relative;
            overflow: hidden;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px;
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            animation: form-pop 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes form-pop {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .auth-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
            border-radius: 14px;
            background: linear-gradient(135deg, #FFD700 0%, #FF8C00 100%);
            font-size: 1.7rem;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(255, 215, 0, 0.25);
            position: relative;
            overflow: hidden;
        }

        .auth-logo svg {
            width: 30px;
            height: 30px;
            fill: white;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .auth-brand-text {
            font-family: 'Inter', sans-serif;
            color: var(--violet);
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 24px;
            display: block;
        }

        .auth-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--heading);
            margin-bottom: 8px;
            line-height: 1.1;
            letter-spacing: -0.5px;
        }

        .auth-sub {
            font-size: 0.95rem;
            color: var(--text2);
            margin-bottom: 36px;
            font-weight: 300;
        }

        .field {
            margin-bottom: 20px;
        }

        .field label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text2);
            margin-bottom: 8px;
        }

        .inp {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border2);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            font-size: 0.95rem;
            transition: var(--trans);
            font-family: 'Inter', sans-serif;
        }

        .inp:focus {
            border-color: var(--violet);
            background: rgba(255, 255, 255, 0.06);
            outline: none;
            box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.2);
        }

        .btn-auth {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            background: linear-gradient(135deg, #7c6af7, #a855f7);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(124, 106, 247, 0.35);
            transition: var(--trans);
            margin-top: 10px;
            font-family: inherit;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(124, 106, 247, 0.45);
        }

        .auth-switch {
            text-align: center;
            margin-top: 28px;
            font-size: 0.9rem;
            color: var(--text3);
        }

        .auth-switch a {
            color: var(--violet2);
            font-weight: 600;
            text-decoration: none;
            transition: var(--trans);
        }

        .auth-switch a:hover {
            color: var(--violet);
            text-decoration: underline;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 28px 0;
            color: var(--text3);
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .auth-divider::not(:empty)::before {
            margin-right: 14px;
        }

        .auth-divider::not(:empty)::after {
            margin-left: 14px;
        }

        .btn-social {
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border2);
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: var(--trans);
            font-family: inherit;
            margin-bottom: 14px;
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        
        .home-link {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text2);
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 10;
            transition: var(--trans);
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border2);
            backdrop-filter: blur(10px);
        }

        .home-link:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.1);
        }
        
        /* Light mode adjustments */
        [data-theme="light"] .auth-container {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(0, 0, 0, 0.08);
        }
        
        [data-theme="light"] .home-link {
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>

    <a href="index.html" class="home-link">
        <span>←</span> Back to Home
    </a>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-logo">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12.4444 6.77778C12.4444 5.79594 13.2404 5 14.2222 5C15.2041 5 16 5.79594 16 6.77778C16 7.75962 15.2041 8.55556 14.2222 8.55556C13.2404 8.55556 12.4444 7.75962 12.4444 6.77778Z" fill="white" fill-opacity="0.4"/>
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M18.8889 2.11111C20.4851 2.11111 21.7778 3.40375 21.7778 5C21.7778 5.6171 21.5833 6.18873 21.2536 6.65595L10.3957 17.5138C10.1654 17.7442 9.90795 17.9407 9.62772 18.0991L4.62772 20.923C4.08405 21.2299 3.43794 20.8938 3.39414 20.2743L3.11111 16.2743C3.09038 15.9814 3.16853 15.6905 3.33614 15.4485L6.65595 10.6542C6.90378 10.2965 7.23485 10.0033 7.6186 9.80164L17.2329 2.63228C17.7214 2.30256 18.2838 2.11111 18.8889 2.11111ZM18.8889 3.88889C18.6657 3.88889 18.4552 3.96246 18.284 4.09553L8.66973 11.2649C8.52985 11.3384 8.40914 11.4452 8.31885 11.5755L5.35242 15.8601L5.5342 18.4239L8.68378 16.6455C8.7858 16.5878 8.87955 16.5161 8.96342 16.4323L19.8213 5.5744C19.944 5.41163 20.0175 5.21092 20.0175 5C20.0175 4.37701 19.5119 3.88889 18.8889 3.88889Z" fill="white"/>
                </svg>
            </div>
            <span class="auth-brand-text">Inkwell</span>
            <h1 class="auth-title">Join Inkwell</h1>
            <p class="auth-sub">Start your masterpiece today. It only takes a minute.</p>

            <form onsubmit="handleSignupSubmit(event)">
                <div class="field">
                    <label>Full Name</label>
                    <input type="text" class="inp" id="sName" placeholder="Your name" required />
                </div>

                <div class="field">
                    <label>Email Address</label>
                    <input type="email" class="inp" id="sEmail" placeholder="you@example.com" required />
                </div>
                
                <div class="field">
                    <label>Password</label>
                    <input type="password" class="inp" id="sPass" placeholder="Min. 8 characters" required />
                </div>

                <button type="submit" class="btn-auth">Create Account</button>
            </form>

            <div class="auth-divider">or join with</div>

            <button class="btn-social" type="button" onclick="doGoogleLogin()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </button>

            <div class="auth-switch">
                Already have an account? <a href="login.html">Log in</a>
            </div>
        </div>
    </div>

    <div class="toasts" id="toasts"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <script>

          authDomain: "inkwell-70599.firebaseapp.com",

          storageBucket: "inkwell-70599.firebasestorage.app",
          messagingSenderId: "632617567306",

    <script src="app.js"></script>
    <script>
        function handleSignupSubmit(e) {
            e.preventDefault();
            // We use the existing logic from app.js to handle signup securely
            doSignup(); 
        }
    </script>
</body>

</html>
