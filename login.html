<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Sign In — Inkwell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(124, 106, 247, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(168, 85, 247, 0.1), transparent), var(--bg);
            position: relative;
            overflow: hidden;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px;
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            animation: form-pop 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes form-pop {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .auth-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
            border-radius: 14px;
            background: linear-gradient(135deg, #c9a84c, #e8c96d);
            font-size: 1.7rem;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(201, 168, 76, 0.35);
        }

        .auth-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--heading);
            margin-bottom: 8px;
            line-height: 1.1;
            letter-spacing: -0.5px;
        }

        .auth-sub {
            font-size: 0.95rem;
            color: var(--text2);
            margin-bottom: 36px;
            font-weight: 300;
        }

        .field {
            margin-bottom: 20px;
        }

        .field label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text2);
            margin-bottom: 8px;
        }

        .inp {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border2);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            font-size: 0.95rem;
            transition: var(--trans);
            font-family: 'Inter', sans-serif;
        }

        .inp:focus {
            border-color: var(--violet);
            background: rgba(255, 255, 255, 0.06);
            outline: none;
            box-shadow: 0 0 0 3px rgba(124, 106, 247, 0.2);
        }

        .btn-auth {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            background: linear-gradient(135deg, #7c6af7, #a855f7);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(124, 106, 247, 0.35);
            transition: var(--trans);
            margin-top: 10px;
            font-family: inherit;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(124, 106, 247, 0.45);
        }

        .auth-switch {
            text-align: center;
            margin-top: 28px;
            font-size: 0.9rem;
            color: var(--text3);
        }

        .auth-switch a {
            color: var(--violet2);
            font-weight: 600;
            text-decoration: none;
            transition: var(--trans);
        }

        .auth-switch a:hover {
            color: var(--violet);
            text-decoration: underline;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 28px 0;
            color: var(--text3);
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .auth-divider::not(:empty)::before {
            margin-right: 14px;
        }

        .auth-divider::not(:empty)::after {
            margin-left: 14px;
        }

        .btn-social {
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border2);
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: var(--trans);
            font-family: inherit;
            margin-bottom: 14px;
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        
        .home-link {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text2);
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 10;
            transition: var(--trans);
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border2);
            backdrop-filter: blur(10px);
        }

        .home-link:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.1);
        }
        
        /* Light mode adjustments */
        [data-theme="light"] .auth-container {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(0, 0, 0, 0.08);
        }
        
        [data-theme="light"] .home-link {
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>

    <a href="index.html" class="home-link">
        <span>←</span> Back to Home
    </a>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-logo">📖</div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-sub">Sign in to continue your writing journey.</p>

            <form onsubmit="handleLoginSubmit(event)">
                <div class="field">
                    <label>Email Address</label>
                    <input type="email" class="inp" id="lEmail" placeholder="you@example.com" required />
                </div>
                
                <div style="display:flex; justify-content: space-between; align-items: baseline;">
                    <label style="font-size: 0.85rem; font-weight: 600; color: var(--text2);">Password</label>
                    <a href="#" style="font-size: 0.78rem; color: var(--violet2); text-decoration: none; font-weight: 600;">Forgot password?</a>
                </div>
                <div class="field" style="margin-top: 8px;">
                    <input type="password" class="inp" id="lPass" placeholder="••••••••" required />
                </div>

                <button type="submit" class="btn-auth">Sign In</button>
            </form>

            <div class="auth-divider">or continue with</div>

            <button class="btn-social" type="button" onclick="doGoogleLogin()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </button>

            <div class="auth-switch">
                Don't have an account? <a href="index.html" onclick="setTimeout(()=>openM('signupM'),100)">Sign up</a>
            </div>
        </div>
    </div>

    <div class="toasts" id="toasts"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="app.js"></script>
    <script>
        function handleLoginSubmit(e) {
            e.preventDefault();
            // We use the existing logic from app.js to handle login securely
            doLogin(); 
            // In app.js, doLogin gets the values by ID ('lEmail' and 'lPass')
            // It will also trigger the toast and redirect to dashboard.html
        }
    </script>
</body>

</html>
