<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reading — Inkwell</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        .reader-sepia {
            background: #f4ecd8 !important;
            color: #5c4a1e !important;
        }

        .reader-sepia .reader-content {
            color: #5c4a1e;
        }

        .reader-sepia .navbar,
        .reader-sepia .reader-controls {
            background: rgba(244, 236, 216, 0.9) !important;
        }

        .reader-paper {
            background: #ffffff !important;
        }

        .reader-paper .reader-content {
            color: #1a1a1a;
        }

        .comment-item {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-author {
            font-weight: 600;
            font-size: 0.88rem;
            margin-bottom: 4px;
        }

        .comment-text {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .comment-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 6px;
        }
    </style>
</head>

<body>

    <div class="reading-progress" id="readingProgress" style="width:0%"></div>

    <nav class="navbar" id="readerNavbar">
        <a href="library.html" class="navbar-brand">
            <div class="logo-icon">📖</div><span>Inkwell</span>
        </a>
        <div style="flex:1;text-align:center">
            <div style="font-weight:600;font-size:0.95rem" id="readerBookTitle">Loading...</div>
            <div style="font-size:0.75rem;color:var(--text-muted)" id="readerBookAuthor"></div>
        </div>
        <div class="navbar-actions">
            <button class="theme-toggle" id="themeToggle">🌙</button>
            <button class="btn btn-icon" onclick="toggleBookmark()" id="bookmarkBtn" title="Bookmark">🔖</button>
            <button class="btn btn-icon" onclick="likeBook()" id="likeBtn" title="Like">🤍</button>
            <button class="btn btn-icon" onclick="shareBook()" title="Share">📤</button>
            <button class="btn btn-primary btn-sm" onclick="toggleReading()" id="readerListenBtn">🎧 Listen</button>
            <button class="btn btn-secondary btn-sm" onclick="toggleComments()">💬 Comments</button>
        </div>
    </nav>

    <!-- READER CONTROLS -->
    <div class="reader-controls" id="readerControls">
        <div class="font-size-control">
            <button class="btn btn-icon" onclick="changeFontSize(-1)">A-</button>
            <span id="fontSizeDisplay">18</span>
            <button class="btn btn-icon" onclick="changeFontSize(1)">A+</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
            <span style="font-size:0.8rem;color:var(--text-muted)">Theme:</span>
            <button class="btn btn-sm btn-secondary" onclick="setReaderTheme('dark')">🌙 Dark</button>
            <button class="btn btn-sm btn-secondary" onclick="setReaderTheme('light')">☀️ Light</button>
            <button class="btn btn-sm btn-secondary" onclick="setReaderTheme('sepia')">📜 Sepia</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
            <span style="font-size:0.8rem;color:var(--text-muted)">Spacing:</span>
            <button class="btn btn-icon btn-sm" onclick="changeSpacing(-0.1)">↕-</button>
            <button class="btn btn-icon btn-sm" onclick="changeSpacing(0.1)">↕+</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
            <span style="font-size:0.8rem;color:var(--text-muted)">Voice:</span>
            <select id="readerVoiceSelect" class="btn btn-sm btn-secondary" style="max-width:140px;padding:4px 8px;font-size:0.75rem" onchange="SpeechEngine.setVoice(this.value); showToast('Voice updated!', 'info')">
                <option value="">Default</option>
            </select>
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-left:auto">
            <button class="btn btn-sm btn-secondary" onclick="toggleReading()" id="readerControlsListenBtn">🎧 Read Aloud</button>
            <div style="font-size:0.8rem;color:var(--text-muted)" id="readingTimeLeft">-- min left</div>
        </div>
    </div>

    <div class="reader-layout" style="padding-top:120px">
        <div style="display:flex;gap:0">
            <!-- CHAPTER NAV -->
            <div style="width:220px;padding:24px 16px;border-right:1px solid var(--border);position:sticky;top:120px;height:calc(100vh - 120px);overflow-y:auto;flex-shrink:0"
                id="chapterNav">
                <h4
                    style="margin-bottom:16px;font-size:0.85rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px">
                    Chapters</h4>
                <div id="chapterNavList"></div>
            </div>

            <!-- MAIN READING AREA -->
            <div style="flex:1;min-width:0">
                <div class="reader-content" id="readerContent">
                    <div class="flex-center" style="padding:60px">
                        <div class="spinner"></div>
                    </div>
                </div>

                <!-- BOOK ACTIONS -->
                <div style="max-width:680px;margin:0 auto;padding:0 24px 40px">
                    <div class="card" style="text-align:center;padding:32px">
                        <div style="font-size:2rem;margin-bottom:12px" id="bookEmojiDisplay">📖</div>
                        <h3 id="bookFinishedTitle">You've finished this chapter!</h3>
                        <p class="mt-1">Enjoyed the story? Show some love.</p>
                        <div class="flex-center gap-2 mt-3">
                            <button class="btn btn-primary" onclick="likeBook()" id="likeBookBtn">🤍 Like</button>
                            <button class="btn btn-secondary" onclick="toggleComments()">💬 Comment</button>
                            <button class="btn btn-secondary" onclick="shareBook()">📤 Share</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- COMMENTS PANEL -->
    <div style="position:fixed;right:0;top:64px;bottom:0;width:360px;background:var(--bg-secondary);border-left:1px solid var(--border);z-index:90;transform:translateX(100%);transition:var(--transition);display:flex;flex-direction:column"
        id="commentsPanel">
        <div
            style="padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
            <h4>Comments (<span id="commentCount">0</span>)</h4>
            <button class="btn-icon" onclick="toggleComments()">✕</button>
        </div>
        <div style="flex:1;overflow-y:auto" id="commentsListEl"></div>
        <div style="padding:16px;border-top:1px solid var(--border)">
            <div style="display:flex;gap:8px">
                <input class="input" id="commentInput" placeholder="Add a comment..."
                    onkeydown="if(event.key==='Enter')addComment()" />
                <button class="btn btn-primary btn-sm" onclick="addComment()">Post</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script>
        if (!localStorage.getItem('user') || localStorage.getItem('user') === 'null') {
            location.href = 'login.html';
        }
    </script>
    <script src="js/app.js"></script>
    <script src="js/reader.js"></script>
</body>

</html>
